<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>G-Connect セルフ受付システム</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; margin: 0; padding: 20px; background-color: #f4f7f6; color: #333; }
    .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    h1 { font-size: 24px; margin-bottom: 20px; }
    button { width: 100%; padding: 15px; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; margin-top: 15px; transition: 0.2s; }
    .btn-main { background-color: #007bff; color: white; }
    .btn-success { background-color: #28a745; color: white; }
    .btn-danger { background-color: #dc3545; color: white; }
    .step-panel { display: none; }
    .step-panel.active { display: block; }
    #reader { width: 100%; max-width: 400px; margin: 0 auto; border-radius: 8px; overflow: hidden; background-color: #eee; }
    .company-display { font-size: 20px; color: #666; margin-top: 20px; font-weight: bold; }
    .name-display { font-size: 32px; font-weight: bold; margin: 10px 0 25px 0; color: #0056b3; }
    .table-display { font-size: 48px; font-weight: bold; margin: 20px 0; color: #d9534f; }
    .loading { font-size: 18px; color: #666; font-style: italic; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
</head>
<body>

<div class="container">
  
  <!-- ステップ1: 初期画面 -->
  <div id="step-start" class="step-panel active">
    <h1>G-Connect セルフ受付</h1>
    <p>下のボタンを押して、QRコードをかざしてください。</p>
    <button class="btn-main" onclick="startScan()">受付を開始する</button>
  </div>

  <!-- ステップ2: カメラ読み取り画面 -->
  <div id="step-scan" class="step-panel">
    <h1>QRコードを読み取っています</h1>
    <div id="reader"></div>
    <button class="btn-danger" onclick="stopScanAndReset()">キャンセル</button>
  </div>

  <!-- ステップ3: お名前・会社名確認画面 -->
  <div id="step-confirm" class="step-panel">
    <h1>情報の確認</h1>
    <p>ご本人様でお間違いないですか？</p>
    <div id="company-area" class="company-display"></div>
    <div id="name-area" class="name-display"></div>
    <button class="btn-success" onclick="confirmIdentity()">はい（受付確定）</button>
    <button class="btn-danger" onclick="stopScanAndReset()">やり直す</button>
  </div>

  <!-- ステップ4: テーブル案内画面 -->
  <div id="step-result" class="step-panel">
    <h1>受付が完了しました！</h1>
    <p>あなたのテーブルは</p>
    <div id="table-area" class="table-display"></div>
    <p>です。その場でスタッフへお会計をお願いします。</p>
    <button class="btn-main" onclick="resetSystem()">次の人へ</button>
  </div>
  
  <div id="loading" class="loading" style="display:none; margin-top:20px;">通信中...</div>

</div>

<script>
  // ⚠️ あなたのGASウェブアプリURLに書き換えてください
  var GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzywpREq_W8Z9wSZVa2mNJV98Vepd8uK9-oDS4Z6NaxSKcotmk50BBbrtyJd6eKPE9WhA/exec";

  let html5QrcodeScanner = null;
  let currentQrData = "";
  let currentCompany = "";
  let currentMemberName = "";

  function changeStep(stepId) {
    document.querySelectorAll('.step-panel').forEach(panel => panel.classList.remove('active'));
    document.getElementById(stepId).classList.add('active');
  }

  function startScan() {
    changeStep('step-scan');
    html5QrcodeScanner = new Html5Qrcode("reader");
    html5QrcodeScanner.start(
      { facingMode: "user" }, 
      { fps: 10, qrbox: { width: 250, height: 250 } },
      onScanSuccess
    ).catch(err => {
      alert("カメラの起動に失敗しました: " + err);
      resetSystem();
    });
  }

  function onScanSuccess(decodedText, decodedResult) {
    if(html5QrcodeScanner) {
      html5QrcodeScanner.stop().then(() => {
        currentQrData = decodedText;
        document.getElementById('loading').style.display = 'block';
        
        // GASへAPI通信を行う
        fetch(GAS_WEBAPP_URL, {
          method: "POST",
          body: JSON.stringify({ method: "findMember", qrData: currentQrData })
        })
        .then(res => res.json())
        .then(onFindMemberSuccess)
        .catch(onApiError);
      });
    }
  }

  function onFindMemberSuccess(result) {
    document.getElementById('loading').style.display = 'none';
    if (result.success) {
      currentCompany = result.company;
      currentMemberName = result.name;
      document.getElementById('company-area').innerText = currentCompany;
      document.getElementById('name-area').innerText = currentMemberName + " 様";
      changeStep('step-confirm');
    } else {
      alert(result.message);
      resetSystem();
    }
  }

  function confirmIdentity() {
    document.getElementById('loading').style.display = 'block';
    
    // GASへ確定データを送信する
    fetch(GAS_WEBAPP_URL, {
      method: "POST",
      body: JSON.stringify({
        method: "confirmRegistration",
        qrData: currentQrData,
        company: currentCompany,
        name: currentMemberName
      })
    })
    .then(res => res.json())
    .then(onConfirmSuccess)
    .catch(onApiError);
  }

  function onConfirmSuccess(result) {
    document.getElementById('loading').style.display = 'none';
    if (result.success) {
      document.getElementById('table-area').innerText = result.table + " テーブル";
      changeStep('step-result');
      
      setTimeout(() => {
        if(document.getElementById('step-result').classList.contains('active')){
          resetSystem();
        }
      }, 7000);
    } else {
      alert(result.message);
      resetSystem();
    }
  }

  function onApiError(error) {
    document.getElementById('loading').style.display = 'none';
    alert("通信エラーが発生しました: " + error.message);
    resetSystem();
  }

  function stopScanAndReset() {
    if (html5QrcodeScanner && html5QrcodeScanner.isScanning) {
      html5QrcodeScanner.stop().then(() => { resetSystem(); }).catch(() => { resetSystem(); });
    } else {
      resetSystem();
    }
  }

  function resetSystem() {
    currentQrData = "";
    currentCompany = "";
    currentMemberName = "";
    document.getElementById('loading').style.display = 'none';
    changeStep('step-start');
  }
</script>

</body>
</html>
